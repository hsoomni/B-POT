{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>B-POT · 처음 심기는 브랜드 씨앗</title>
  <meta name="description" content="버튼을 눌러가며 10개의 질문에 답하면, 나만의 브랜드 씨앗 결과지(씨앗 봉투)를 받아보는 웹앱." />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="{% static 'css/app.css' %}" />
</head>
<body>
  <div id="app" class="app"></div>

  {{ bootstrap|json_script:"bpot-data" }}
  <script>
    window.CSRF_TOKEN = "{{ csrf_token }}";
  </script>

  <!-- 라이브러리: Three.js(3D 인트로), html2canvas(PNG 저장) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- 앱 모듈 (순서 중요) -->
  <script src="{% static 'js/intro3d.js' %}"></script>
  <script src="{% static 'js/growth3d.js' %}"></script>
  <script src="{% static 'js/questions.js' %}"></script>
  <script src="{% static 'js/result.js' %}"></script>
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
